name: evora
description: EVORA – Smart Event & Registration Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase (Backend) ──────────────────────────────────────
  # Updated to latest stable versions to resolve build and runtime errors
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.7.5
  firebase_messaging: ^14.9.2
  google_sign_in: ^6.2.1

  # ── Payment (Stripe) ────────────────────────────────────────
  flutter_stripe: ^12.4.0

  # ── State Management ────────────────────────────────────────
  provider: ^6.1.1

  # ── Image & Media ────────────────────────────────────────────
  image_picker: ^1.0.5
  cached_network_image: ^3.3.0
  cloudinary_public: ^0.23.1

  # For Email OTP (Sending the request)
  http: ^1.1.0

  # For Phone OTP (Pretty Input Boxes)
  pinput: ^4.0.0

  # ── QR Code ─────────────────────────────────────────────────
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.2

  # ── PDF / Invoice ────────────────────────────────────────────
  pdf: ^3.10.7
  printing: ^5.12.0
  path_provider: ^2.1.1

  # ── UI & Charts ──────────────────────────────────────────────
  fl_chart: ^0.66.0
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # ── Animations ───────────────────────────────────────────────
  flutter_staggered_animations: ^1.1.1

  # ── Notifications & Timezone ────────────────────────────────
  timezone: ^0.9.2
  flutter_timezone: ^3.0.0
  flutter_local_notifications: ^17.1.2

  # ── Encryption (for EncryptionService) ──────────────────────
  crypto: ^3.0.3
  bcrypt: ^1.1.3

  # ── Utilities ────────────────────────────────────────────────
  uuid: ^4.2.1
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  confetti: ^0.7.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/logo.png
    - assets/images/event.png
    - .env
    - assets/data/categories.json
    - assets/data/subcategories.json
    - assets/data/services.json
